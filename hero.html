<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Hero Section</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/hero.css">
</head>
<body>
    <section class="hero">
        <div class="hero__container">
            <!-- Floating Cards Container -->
            <div class="hero__cards-container">
                <div class="hero__card hero__card--1">
                    <div class="hero__card-tilt">
                        <div class="hero__card-inner">
                            <div class="hero__card-icon"></div>
                            <span class="hero__card-label"></span>
                        </div>
                    </div>
                </div>
                <div class="hero__card hero__card--2">
                    <div class="hero__card-tilt">
                        <div class="hero__card-inner">
                            <div class="hero__card-icon"></div>
                            <span class="hero__card-label"></span>
                        </div>
                    </div>
                </div>
                <div class="hero__card hero__card--3">
                    <div class="hero__card-tilt">
                        <div class="hero__card-inner">
                            <div class="hero__card-icon"></div>
                            <span class="hero__card-label"></span>
                        </div>
                    </div>
                </div>
                <div class="hero__card hero__card--4">
                    <div class="hero__card-tilt">
                        <div class="hero__card-inner">
                            <div class="hero__card-icon"></div>
                            <span class="hero__card-label"></span>
                        </div>
                    </div>
                </div>
                <div class="hero__card hero__card--5">
                    <div class="hero__card-tilt">
                        <div class="hero__card-inner">
                            <div class="hero__card-icon"></div>
                            <span class="hero__card-label"></span>
                        </div>
                    </div>
                </div>
                <div class="hero__card hero__card--6">
                    <div class="hero__card-tilt">
                        <div class="hero__card-inner">
                            <div class="hero__card-icon"></div>
                            <span class="hero__card-label"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Content Area -->
            <div class="hero__content">
                <h1 class="hero__headline">
                    <span class="hero__headline-top">Let's take your</span>
                    <span class="hero__dynamic-wrapper">
                        <span class="hero__dynamic-word" id="dynamic-word">brand</span>
                    </span>
                    <span class="hero__headline-bottom">to the next level</span>
                </h1>
                
                <p class="hero__description">
                    We craft stunning digital experiences that blend creativity with cutting-edge technology to help you stand out.
                </p>

                <div class="hero__cta">
                    <a href="#" class="hero__btn hero__btn--primary">Start a Project</a>
                    <a href="#" class="hero__btn hero__btn--secondary">View Work</a>
                </div>
            </div>
        </div>
    </section>

    <script src="./js/hero.js"></script>
</body>
</html>
